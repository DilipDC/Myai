<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QuantumAI | DILIP DC</title>

<style>
:root {
  --bg: #020617;
  --accent: #00f2ff;
  --accent-dim: rgba(0, 242, 255, 0.15);
  --user-gradient: linear-gradient(135deg, #6366f1, #a855f7);
  --glass: rgba(15, 23, 42, 0.8);
  --border: rgba(0, 242, 255, 0.3);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  margin: 0; font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  background-image: 
    radial-gradient(circle at 50% 0%, #1e1b4b 0%, #020617 70%),
    repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0,242,255,0.03) 1px, rgba(0,242,255,0.03) 2px);
  background-size: 100% 100%, 100% 4px;
  color: #f8fafc; height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
}

/* --- DILIP DC BIOMETRIC OVERLAY --- */
#welcomeOverlay {
  position: fixed; inset: 0; background: var(--bg); z-index: 10000;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.bio-circle {
  width: 120px; height: 120px; border: 2px solid var(--accent);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 30px var(--accent-dim); animation: pulse 2s infinite;
}
.dilip-brand { 
  margin-top: 20px; font-size: 24px; letter-spacing: 4px; color: var(--accent);
  text-transform: uppercase; font-weight: 900; animation: glitch 2s infinite;
}
@keyframes glitch {
  0% { transform: skew(0deg); }
  2% { transform: skew(10deg); color: #ff00c1; }
  4% { transform: skew(0deg); }
}

/* --- HEADER --- */
header {
  padding: 12px 20px; background: var(--glass); backdrop-filter: blur(15px);
  border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
}
.avatar-head {
  display: flex; align-items: center; gap: 10px;
}
.torso-icon {
  width: 35px; height: 35px; background: var(--accent-dim);
  border-radius: 50%; border: 1px solid var(--accent);
  display: flex; justify-content: center; align-items: center;
}

/* --- CHAT AREA --- */
#chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; }

.msg-container { display: flex; gap: 10px; max-width: 85%; animation: fadeIn 0.4s ease; }
.ai-container { align-self: flex-start; }
.user-container { align-self: flex-end; flex-direction: row-reverse; }

.msg {
  padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.5;
  position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
.ai { background: var(--glass); border: 1px solid var(--border); border-top-left-radius: 2px; }
.user { background: var(--user-gradient); border-top-right-radius: 2px; }

/* AI TORSO AVATAR IN CHAT */
.chat-torso {
  width: 30px; height: 30px; min-width: 30px; border-radius: 50%;
  background: var(--accent); display: flex; align-items: center; justify-content: center;
  font-size: 14px; box-shadow: 0 0 10px var(--accent);
}

/* --- IMAGE PREVIEW --- */
.chat-img { 
    max-width: 100%; border-radius: 10px; margin-top: 5px; 
    border: 1px solid var(--border);
}

/* --- INPUT BAR --- */
#inputBar {
  padding: 15px; background: var(--glass); backdrop-filter: blur(20px);
  border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center;
}
#msgBox {
  flex: 1; background: rgba(0,0,0,0.4); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px; color: white; outline: none;
}
.btn-group { display: flex; gap: 5px; }
.icon-btn {
  width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border);
  background: #0f172a; color: var(--accent); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: 0.3s;
}
.icon-btn:hover { background: var(--accent); color: black; }
.send-btn { background: var(--accent); color: black; border: none; font-weight: bold; }

/* Hide default file input */
#fileInput { display: none; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(0, 242, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); } }

/* Copy Box */
.code-box { background: #000; border-radius: 8px; margin-top: 10px; overflow: hidden; border: 1px solid #333; }
.code-header { background: #111; padding: 5px 10px; font-size: 10px; color: var(--accent); display: flex; justify-content: space-between; }
</style>
</head>

<body>

<div id="welcomeOverlay">
  <div class="bio-circle">
    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent)">
        <path d="M12 11c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zM12 13c-2.67 0-8 1.34-8 4v3h16v-3c0-2.66-5.33-4-8-4z"/>
    </svg>
  </div>
  <div class="dilip-brand">DILIP DC</div>
  <p style="color:#64748b; font-size: 12px; margin-top: 10px;">QUANTUM CORE INITIALIZED</p>
  <button onclick="unlock()" style="margin-top:30px; padding:12px 40px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer; letter-spacing:2px;">AUTHENTICATE</button>
</div>

<header>
  <div class="avatar-head">
    <div class="torso-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--accent)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </div>
    <div>
        <div style="font-weight:bold; font-size:14px;">QUANTUM AI</div>
        <div style="font-size:10px; color:var(--accent)">CREATOR: DILIP DC</div>
    </div>
  </div>
  <div onclick="toggleTheme()" style="cursor:pointer">🌙</div>
</header>

<div id="chat">
  <div class="msg-container ai-container">
    <div class="chat-torso">AI</div>
    <div class="msg ai">Neural sync complete. Hello, <b>DILIP DC</b>. How can I assist your vision today?</div>
  </div>
</div>

<div id="inputBar">
  <input type="file" id="fileInput" accept="image/*" onchange="uploadImage()">
  <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📁</button>
  
  <input id="msgBox" placeholder="Type a command..." onkeypress="if(event.key==='Enter') send()">
  
  <div class="btn-group">
    <button class="icon-btn" onclick="voice()">🎤</button>
    <button class="icon-btn" onclick="newChat()">✨</button>
    <button class="icon-btn send-btn" onclick="send()">➔</button>
  </div>
</div>

<script>
// --- 200 IQ ENGINE BY DILIP DC ---

function unlock() {
    const overlay = document.getElementById('welcomeOverlay');
    overlay.style.opacity = '0';
    overlay.style.transform = 'scale(1.2)';
    setTimeout(() => overlay.style.display = 'none', 800);
}

// Speaking Feature (TTS)
function speak(text) {
    const msg = new SpeechSynthesisUtterance(text);
    const voices = window.speechSynthesis.getVoices();
    // Select a futuristic-sounding voice if available
    msg.voice = voices.find(v => v.name.includes('Google UK English Male')) || voices[0];
    msg.rate = 1.0;
    msg.pitch = 0.8; 
    window.speechSynthesis.speak(msg);
}

function addMsg(text, type) {
    const chat = document.getElementById("chat");
    const container = document.createElement("div");
    container.className = `msg-container ${type}-container`;
    
    let avatar = type === 'ai' ? `<div class="chat-torso">AI</div>` : "";
    
    let content = "";
    if (text.startsWith("```")) {
        let code = text.replace(/```/g, "").trim();
        content = `<div class="msg ${type} code-box">
                    <div class="code-header"><span>TERMINAL</span><span onclick="copyCode(this)" style="cursor:pointer">COPY</span></div>
                    <pre style="margin:10px; color:#00ffcc; font-size:12px; overflow-x:auto;"><code>${code}</code></pre>
                  </div>`;
    } else {
        content = `<div class="msg ${type}">${text}</div>`;
    }

    container.innerHTML = avatar + content;
    chat.appendChild(container);
    chat.scrollTop = chat.scrollHeight;

    if(type === 'ai') {
        // Intercept identity questions locally for Dilip DC
        if(text.toLowerCase().includes("your name")) speak("My name is Quantum AI, and I was developed by Dilip DC.");
        else speak(text.substring(0, 100)); // Speak first 100 chars
    }

    return container;
}

async function send() {
    const box = document.getElementById("msgBox");
    const text = box.value.trim();
    if (!text) return;

    addMsg(text, "user");
    box.value = "";

    const typingContainer = addMsg("Thinking...", "ai");
    const typingMsg = typingContainer.querySelector('.msg');

    try {
        const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        typingMsg.innerText = data.reply;
        speak(data.reply);
    } catch (e) {
        typingMsg.innerText = "System bypass required. Connection lost.";
    }
}

// Local File Upload Logic (200 IQ Way)
function uploadImage() {
    const file = document.getElementById('fileInput').files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const container = document.createElement("div");
            container.className = `msg-container user-container`;
            container.innerHTML = `<div class="msg user"><img src="${e.target.result}" class="chat-img"><br><small>Image Uploaded</small></div>`;
            document.getElementById("chat").appendChild(container);
            document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
            
            // Send a trigger to the AI that an image was seen
            // (Note: Since app.py doesn't handle files, we send a text notification)
            box = document.getElementById("msgBox");
            box.value = "I have uploaded an image. Can you analyze it?";
        };
        reader.readAsDataURL(file);
    }
}

function voice() {
    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = "en-US";
    rec.onstart = () => document.getElementById("msgBox").placeholder = "Listening...";
    rec.onresult = (e) => {
        document.getElementById("msgBox").value = e.results[0][0].transcript;
        send();
    };
    rec.onend = () => document.getElementById("msgBox").placeholder = "Type a command...";
    rec.start();
}

function newChat() {
    document.getElementById("chat").innerHTML = "";
    addMsg("All temporary logs purged. Quantum state reset.", "ai");
}

function copyCode(span) {
    const code = span.closest('.code-box').querySelector('code').innerText;
    navigator.clipboard.writeText(code);
    span.innerText = "COPIED";
    setTimeout(() => span.innerText = "COPY", 2000);
}

function toggleTheme() {
    document.body.style.filter = document.body.style.filter === 'hue-rotate(180deg)' ? 'hue-rotate(0deg)' : 'hue-rotate(180deg)';
}

// Load history with voice
async function loadHistory() {
    try {
        const r = await fetch("/history");
        const data = await r.json();
        data.reverse().forEach(row => {
            addMsg(row[0], "user");
            addMsg(row[1], "ai");
        });
    } catch (e) {}
}

window.onload = loadHistory;
</script>

</body>
</html>
