
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QuantumAI V2 Chat</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
background:#020617;
border-bottom:1px solid #1e293b;
}

header h1{
margin:0;
font-size:18px;
color:#22c55e;
}

#themeBtn{
cursor:pointer;
font-size:18px;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.msg{
max-width:70%;
padding:12px 16px;
border-radius:16px;
line-height:1.4;
animation:fade .15s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(5px)}
to{opacity:1}
}

.user{
background:#22c55e;
color:black;
align-self:flex-end;
}

.ai{
background:#1e293b;
}

.code{
background:#000;
color:#00ff9c;
font-family:monospace;
white-space:pre-wrap;
}

img.chatimg{
max-width:200px;
border-radius:10px;
margin-top:5px;
}

#inputBar{
display:flex;
gap:6px;
padding:10px;
background:#020617;
border-top:1px solid #1e293b;
}

#msgBox{
flex:1;
padding:12px;
border-radius:10px;
border:none;
outline:none;
}

button{
padding:10px 14px;
border:none;
background:#22c55e;
border-radius:8px;
cursor:pointer;
}

button:hover{
opacity:.8;
}

.light{
background:white;
color:black;
}

.light #chat{
background:white;
}

</style>
</head>

<body>

<header>
<h1>⚡ QuantumAI Chat</h1>
<div>
<span id="themeBtn">🌙</span>
</div>
</header>

<div id="chat">
<div class="msg ai">Hello! I am QuantumAI. How can I help you?</div>
</div>

<div id="inputBar">
<input id="msgBox" placeholder="Type your message...">
<button onclick="send()">Send</button>
<button onclick="voice()">🎤</button>
<button onclick="image()">📷</button>
<button onclick="newChat()">New</button>
</div>

<script>

const chat = document.getElementById("chat")

function addMsg(text,type){

const div=document.createElement("div")
div.className="msg "+type

if(text.startsWith("```")){
div.classList.add("code")
text=text.replace(/```/g,"")
}

div.innerText=text

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight

return div
}

function addImage(src){

const div=document.createElement("div")
div.className="msg user"

const img=document.createElement("img")
img.src=src
img.className="chatimg"

div.appendChild(img)

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight
}

async function send(){

const box=document.getElementById("msgBox")
const text=box.value.trim()

if(!text) return

addMsg(text,"user")
box.value=""

const typing=addMsg("Thinking...","ai")

const res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
})

const data=await res.json()
typing.innerText=data.reply
}

function newChat(){
chat.innerHTML=""
addMsg("New conversation started.","ai")
}

function voice(){

const rec=new webkitSpeechRecognition()
rec.lang="en-US"

rec.onresult=function(e){
document.getElementById("msgBox").value=e.results[0][0].transcript
}

rec.start()
}

function image(){

const url=prompt("Enter image URL")
if(url) addImage(url)
}

document.getElementById("themeBtn").onclick=function(){
document.body.classList.toggle("light")
}

async function loadHistory(){

const r=await fetch("/history")
const data=await r.json()

data.reverse().forEach(row=>{
addMsg(row[0],"user")
addMsg(row[1],"ai")
})

}

loadHistory()

</script>

</body>
</html>
